<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doghelper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #2b2416;
  color: #e5e7eb;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: #1a0e05;
  padding: clamp(4px, 1.5vh, 8px) clamp(6px, 2vw, 12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: clamp(13px, 4.5vw, 20px);
  font-weight: 700;
  color: #fff;
}
.settings-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: clamp(13px, 4vw, 18px);
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  opacity: 0.8;
}
.settings-btn:hover { opacity: 1; background: rgba(255,255,255,0.1); }

/* ── Main body ── */
.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 8px;
  min-height: 0;
  overflow: hidden;
  gap: 4px;
}

/* ── Icon grid ── */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(4px, 1.5vw, 8px);
  flex-shrink: 0;
}

.btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(2px, 0.5vh, 4px);
  min-height: 0;
  overflow: hidden;
}

.btn-label { display: none; }

.icon-btn {
  width: 30px;
  height: 30px;
  background: #f5f0e8;
  border: 2px solid #d4cfc6;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  padding: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.icon-btn img {
  width: 26px;
  height: 26px;
  object-fit: contain;
  display: block;
}
.icon-btn.off {
  opacity: 0.4;
  filter: grayscale(1);
}
.icon-btn.on {
  border-color: #f59e0b;
  box-shadow: 0 0 8px rgba(245,158,11,0.4);
}
.icon-btn.alerting {
  animation: glow .5s ease-in-out infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 0 4px rgba(245,158,11,.4); }
  to   { box-shadow: 0 0 18px rgba(245,158,11,1); }
}

/* Dot indicator */
.icon-btn::after {
  content: "";
  position: absolute;
  top: 4px; right: 4px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  display: none;
}
.icon-btn.on::after { display: block; }
.icon-btn.off::after { display: block; background: #6b7280; }

/* ── Last alert ── */
.last-alert {
  font-size: 11px;
  color: #f59e0b;
  min-height: 14px;
  margin-top: 10px;
  text-align: center;
}

/* ── Timer box ── */
.timer-box {
  background: #f5f0e8;
  border-radius: 10px;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.timer-display {
  flex: 1;
  font-size: clamp(14px, 7vw, 28px);
  font-weight: 700;
  color: #1a1a1a;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  text-align: center;
  background: #fff;
  border: 2px solid #ccc;
  border-radius: 6px;
  padding: clamp(3px, 1vh, 6px) clamp(4px, 1.5vw, 10px);
  transition: color .3s;
  min-width: 0;
}
.timer-display.done { color: #ef4444; }

.timer-play {
  width: clamp(32px, 10vw, 52px);
  height: clamp(32px, 10vw, 52px);
  background: rgb(6, 7, 105);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.timer-play:hover { background: rgb(10, 12, 140); }
.timer-play.paused { background: #f59e0b; }
.timer-play.paused:hover { background: #d97706; }

/* Play triangle */
.play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: clamp(6px,2vw,10px) 0 clamp(6px,2vw,10px) clamp(10px,3.5vw,18px);
  border-color: transparent transparent transparent #fff;
  margin-left: 2px;
}
/* Pause bars */
.pause-icon {
  display: flex; gap: clamp(3px,1vw,5px);
}
.pause-icon span {
  display: block;
  width: clamp(3px,1vw,5px);
  height: clamp(12px,4vw,20px);
  background: #fff;
  border-radius: 2px;
}

.timer-reset {
  width: clamp(32px, 10vw, 52px);
  height: clamp(32px, 10vw, 52px);
  background: #d4cfc6;
  border: none; border-radius: 6px;
  cursor: pointer; font-size: clamp(10px, 3vw, 16px);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.timer-reset:hover { background: #bbb6ac; }

/* ── Settings overlay ── */
#settings-panel {
  display: none;
  position: fixed; inset: 0;
  background: #1a1612;
  flex-direction: column;
  padding: 14px;
  gap: 12px;
  z-index: 10;
}
#settings-panel.open { display: flex; }
#settings-panel h2 { color: #f59e0b; font-size: 15px; border-bottom: 1px solid #333; padding-bottom: 6px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
.setting-info { display: flex; flex-direction: column; gap: 2px; }
.setting-label { font-weight: 600; color: #e5e7eb; }
.setting-desc { font-size: 11px; color: #6b7280; }
.toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #374151; border-radius: 22px; cursor: pointer; transition: background .2s; }
.slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #9ca3af; border-radius: 50%; transition: transform .2s, background .2s; }
.toggle-switch input:checked + .slider { background: rgba(245,158,11,.3); }
.toggle-switch input:checked + .slider::before { transform: translateX(18px); background: #f59e0b; }
.trigger-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.trigger-item { background: #2b2416; border-left: 3px solid #f59e0b; padding: 4px 8px; border-radius: 0 4px 4px 0; font-size: 11px; color: #d1d5db; font-style: italic; }
.close-btn { align-self: flex-start; background: #374151; border: none; color: #e5e7eb; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }

/* ── Add screen ── */
#add-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 16px; padding: 24px; text-align: center;
  background: #2b2416;
}
#add-screen h2 { color: #f59e0b; font-size: 20px; }
#add-screen p { color: #9ca3af; font-size: 13px; line-height: 1.5; }
#add-btn {
  display: inline-block; margin-top: 8px;
  padding: 12px 28px; background: #f59e0b; color: #111827;
  font-size: 15px; font-weight: 700; border-radius: 8px;
  text-decoration: none; cursor: pointer;
}
#add-btn:hover { opacity: .85; }

/* ── Status ── */
.status-bar { font-size: 10px; color: #4b5563; text-align: center; padding: 3px 0; }
</style>
</head>
<body>

<!-- Add screen -->
<div id="add-screen">
  <h2>Doghelper</h2>
  <p>Click below to add this plugin to your Alt1 Toolkit.</p>
  <a id="add-btn" href="#">Add to Alt1</a>
</div>

<!-- Main app -->
<div id="main-app" style="display:none; flex-direction:column; flex:1; min-height:0;">

  <div class="header">
    <h1>🐾 Doghelper</h1>
    <button class="settings-btn" id="settings-open-btn" title="Settings">⚙</button>
  </div>

  <div class="body">

    <div>
      <div class="icon-grid">
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lootbeam" title="Lootbeam alert">
            <img src="lootbeam.png" alt="">
          </button>
          <span class="btn-label">Lootbeam</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-scripture" title="Scripture of Elidinis">
            <img src="scripture.png" alt="">
          </button>
          <span class="btn-label">Scripture</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lobby" title="15-min lobby timer">
            <img src="lobby.png" alt="">
          </button>
          <span class="btn-label">Lobby</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-xp" title="XP Checker">
            <img src="xp.png" alt="">
          </button>
          <span class="btn-label">XP Check</span>
        </div>
      </div>
      <div id="last-alert" class="last-alert"></div>
    </div>

    <div>
      <div class="timer-box">
        <div id="timer-display" class="timer-display">60:00</div>
        <button class="timer-reset" id="timer-reset" title="Reset">↺</button>
        <button class="timer-play" id="timer-play">
          <div class="play-icon" id="play-icon"></div>
        </button>
      </div>
      <div id="status-bar" class="status-bar">Connecting...</div>
    </div>

  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <button class="close-btn" id="settings-close-btn">← Back</button>
  <h2>Settings</h2>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Startup</div>
    <label class="setting-row" style="cursor:pointer">
      <div class="setting-info">
        <span class="setting-label">Auto-boot on chatbox detect</span>
        <span class="setting-desc">Start monitoring when a chatbox is found on screen</span>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="setting-autoboot">
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Lootbeam Phrases</div>
    <ul class="trigger-list" id="trigger-list"></ul>
  </div>
</div>

<script>
// ── Alerters from JSON ────────────────────────────────────────────────────────
const CHAT_ALERTERS = [
  {
    id: "lootbeam",
    colors: [[245,151,0]],
    lastAlert: 0
  },
  {
    id: "scripture",
    colors: [[255,255,255],[127,169,255],[30,251,0],[233,47,47]],
    lastAlert: 0
  }
];

const LOBBY_DELAY = 570;   // 9:30 — matches JSON delay:570
const XP_IDLE_MS  = 3000;  // 3s no XP — matches JSON delay:3
const COLOR_TOL   = 35;
const MIN_PIX     = 40;
const SCAN_MS     = 600;

let settings = loadSettings();
let timerSeconds = LOBBY_DELAY;
let timerRunning = false;
let timerInterval = null;
let lastXpSeen = Date.now();
let xpAlerted = false;

function loadSettings() {
  const def = { lootbeam:true, scripture:true, lobby:true, xp:true };
  try { return Object.assign(def, JSON.parse(localStorage.getItem("doghelper")||"{}")); }
  catch { return def; }
}
function saveSettings() { localStorage.setItem("doghelper", JSON.stringify(settings)); }

// ── Audio ─────────────────────────────────────────────────────────────────────
function playAlert(urgent) {
  try {
    const ctx = new AudioContext();
    const notes = urgent ? [880,1100,880] : [659,784,1047];
    notes.forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=freq; osc.type="sine";
      const t=ctx.currentTime+i*0.15;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.35,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    });
  } catch(e) {}
}

// ── Pixel helpers ─────────────────────────────────────────────────────────────
function colMatch(r,g,b,c) {
  return Math.abs(r-c[0])<COLOR_TOL && Math.abs(g-c[1])<COLOR_TOL && Math.abs(b-c[2])<COLOR_TOL;
}
function hasColor(pixels, colors) {
  for (const c of colors) {
    let n=0;
    for (let i=0;i<pixels.length;i+=4)
      if (colMatch(pixels[i],pixels[i+1],pixels[i+2],c) && ++n>=MIN_PIX) return true;
  }
  return false;
}

// ── Alert trigger ─────────────────────────────────────────────────────────────
function triggerAlert(id, urgent=false) {
  playAlert(urgent);
  const btn=document.getElementById("btn-"+id);
  if (btn) { btn.classList.add("alerting"); setTimeout(()=>btn.classList.remove("alerting"),3000); }
  document.getElementById("last-alert").textContent =
    "["+new Date().toLocaleTimeString()+"] "+id+" detected!";
}

// ── Scan loop ─────────────────────────────────────────────────────────────────
function scan() {
  if (typeof alt1==="undefined"||!alt1.permissionPixel) return;
  try {
    const rsW=alt1.rsWidth,rsH=alt1.rsHeight,rsX=alt1.rsX,rsY=alt1.rsY;
    if (!rsW||!rsH) return;

    // Chatbox region (bottom-left)
    const chat = alt1.capture(rsX, rsY+Math.floor(rsH*0.78), Math.floor(rsW*0.62), Math.floor(rsH*0.22));
    if (chat) {
      const now=Date.now();
      for (const a of CHAT_ALERTERS) {
        if (!settings[a.id] || now-a.lastAlert<3000) continue;
        if (hasColor(chat, a.colors)) { a.lastAlert=now; triggerAlert(a.id); }
      }
    }

    // XP drops region (top-right) — alert if no XP for 3s
    if (settings.xp) {
      const xp = alt1.capture(rsX+Math.floor(rsW*0.65), rsY+Math.floor(rsH*0.03), Math.floor(rsW*0.35), Math.floor(rsH*0.35));
      if (xp && hasColor(xp,[[255,200,0],[255,165,0],[180,255,80]],5)) {
        lastXpSeen=Date.now(); xpAlerted=false;
      } else if (Date.now()-lastXpSeen>XP_IDLE_MS && !xpAlerted) {
        xpAlerted=true; triggerAlert("xp");
      }
    }
  } catch(e) { console.error(e); }
}

// ── Lobby timer ───────────────────────────────────────────────────────────────
function fmt(s) { return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function updateTimerDisplay() { document.getElementById("timer-display").textContent=fmt(timerSeconds); }
function setPlayIcon(on) {
  const icon=document.getElementById("play-icon"), btn=document.getElementById("timer-play");
  icon.outerHTML = on
    ? '<div class="pause-icon" id="play-icon"><span></span><span></span></div>'
    : '<div class="play-icon" id="play-icon"></div>';
  btn.classList.toggle("paused",on);
}
function startTimer() {
  if (timerRunning) return;
  timerRunning=true; setPlayIcon(true);
  document.getElementById("timer-display").classList.remove("done");
  timerInterval=setInterval(()=>{
    if (timerSeconds<=0) {
      clearInterval(timerInterval); timerRunning=false; setPlayIcon(false);
      document.getElementById("timer-display").classList.add("done");
      triggerAlert("lobby",true); return;
    }
    timerSeconds--; updateTimerDisplay();
  },1000);
}
function pauseTimer() {
  timerRunning=false; clearInterval(timerInterval); timerInterval=null; setPlayIcon(false);
}
function resetTimer() {
  pauseTimer(); timerSeconds=LOBBY_DELAY; updateTimerDisplay();
  document.getElementById("timer-display").classList.remove("done");
}

function updateStatus(msg) { document.getElementById("status-bar").innerHTML=msg; }

// ── Toggle button ─────────────────────────────────────────────────────────────
function toggleBtn(id) {
  settings[id]=!settings[id];
  const btn=document.getElementById("btn-"+id);
  btn.classList.toggle("on",settings[id]);
  btn.classList.toggle("off",!settings[id]);
  // Lobby button drives the timer
  if (id==="lobby") { settings[id] ? (resetTimer(),startTimer()) : pauseTimer(); }
  // XP toggle resets idle tracking
  if (id==="xp") { lastXpSeen=Date.now(); xpAlerted=false; }
  saveSettings();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  const cfgUrl=new URL("appconfig.json",window.location.href).href;
  document.getElementById("add-screen").style.display="none";
  document.getElementById("main-app").style.display="flex";

  if (typeof alt1!=="undefined") {
    alt1.identifyAppUrl(cfgUrl);
    if (!alt1.permissionPixel) {
      updateStatus('\u26a0 Not added — <a href="alt1://addapp/'+cfgUrl+'" style="color:#f59e0b">click here</a>');
    } else {
      updateStatus("Alt1 connected — scanning...");
      setInterval(scan, SCAN_MS);
    }
  } else {
    updateStatus("Open in Alt1 to use");
  }

  // Init all buttons
  ["lootbeam","scripture","lobby","xp"].forEach(id => {
    const btn=document.getElementById("btn-"+id);
    btn.classList.toggle("on", settings[id]);
    btn.classList.toggle("off", !settings[id]);
    btn.addEventListener("click", ()=>toggleBtn(id));
  });

  // Timer controls
  updateTimerDisplay();
  document.getElementById("timer-play").addEventListener("click", ()=>timerRunning?pauseTimer():startTimer());
  document.getElementById("timer-reset").addEventListener("click", resetTimer);

  // Settings panel
  document.getElementById("settings-open-btn").addEventListener("click", ()=>
    document.getElementById("settings-panel").classList.add("open"));
  document.getElementById("settings-close-btn").addEventListener("click", ()=>
    document.getElementById("settings-panel").classList.remove("open"));

  // Auto-start lobby timer if enabled
  if (settings.lobby) { resetTimer(); startTimer(); }
});
</script>
</body>
</html>
