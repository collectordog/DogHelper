<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doghelper</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Cinzel', 'Georgia', serif;
  background: #0d0a06;
  color: #c8a04e;
  font-size: 12px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: linear-gradient(180deg, #2a1c0a 0%, #1a1006 100%);
  border-bottom: 2px solid #6b4c1a;
  padding: 5px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: 13px;
  font-weight: 700;
  color: #f0c040;
  text-shadow: 0 1px 3px #000, 0 0 8px rgba(200,160,78,.4);
  letter-spacing: 1px;
}
.settings-btn {
  background: none;
  border: 1px solid #4a3210;
  cursor: pointer;
  font-size: 13px;
  color: #c8a04e;
  padding: 1px 5px;
  border-radius: 3px;
  opacity: 0.85;
  transition: all .15s;
}
.settings-btn:hover { opacity: 1; border-color: #c8a04e; background: rgba(200,160,78,.1); }

/* ── Main body ── */
.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 6px;
  min-height: 0;
  overflow: hidden;
  gap: 5px;
  background: linear-gradient(180deg, #120d05 0%, #0d0a06 100%);
}

/* ── Divider ── */
.rs-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, #6b4c1a 20%, #c8a04e 50%, #6b4c1a 80%, transparent);
  flex-shrink: 0;
}

/* ── Icon grid ── */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  flex-shrink: 0;
  justify-items: center;
}

.btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  min-height: 0;
  overflow: hidden;
}

.btn-label { display: none; }

.icon-btn {
  width: 35px;
  height: 35px;
  background: linear-gradient(180deg, #1e1508 0%, #120d04 100%);
  border: 1px solid #4a3210;
  border-bottom-color: #2a1c08;
  border-right-color: #2a1c08;
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  padding: 2px;
  overflow: hidden;
  flex-shrink: 0;
}
.icon-btn img {
  width: 31px;
  height: 31px;
  object-fit: contain;
  display: block;
}
.icon-btn.off {
  opacity: 0.35;
  filter: grayscale(1);
}
.icon-btn.on {
  border-color: #c8a04e;
  box-shadow: 0 0 6px rgba(200,160,78,0.5), inset 0 0 4px rgba(200,160,78,0.1);
}
.icon-btn.alerting {
  animation: glow .5s ease-in-out infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 0 4px rgba(240,192,64,.5); }
  to   { box-shadow: 0 0 16px rgba(240,192,64,1); }
}


/* ── Last alert ── */
.last-alert {
  font-size: 10px;
  color: #f0c040;
  min-height: 13px;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  text-shadow: 0 0 6px rgba(240,192,64,.6);
}

/* ── Timer box ── */
.timer-box {
  background: linear-gradient(180deg, #1e1508 0%, #120d04 100%);
  border: 1px solid #4a3210;
  border-radius: 3px;
  padding: 5px 6px;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}
.timer-display {
  flex: 1;
  font-size: 18px;
  font-weight: 700;
  color: #f0c040;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  text-align: center;
  background: #080603;
  border: 1px solid #4a3210;
  border-radius: 2px;
  padding: 2px 6px;
  transition: color .3s;
  min-width: 0;
  text-shadow: 0 0 8px rgba(240,192,64,.7);
}
.timer-display.done { color: #ef4444; text-shadow: 0 0 8px rgba(239,68,68,.7); }

.timer-play, .timer-reset, .scan-btn {
  width: 26px;
  height: 26px;
  border: 1px solid #6b4c1a;
  border-radius: 2px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all .15s;
}

.timer-play {
  background: linear-gradient(180deg, #7a5c18 0%, #4a3210 100%);
}
.timer-play:hover { background: linear-gradient(180deg, #c8a04e 0%, #8b6914 100%); border-color: #f0c040; }
.timer-play.paused { background: linear-gradient(180deg, #3a3a3a 0%, #222 100%); border-color: #555; }
.timer-play.paused:hover { background: linear-gradient(180deg, #555 0%, #333 100%); }

/* Play triangle */
.play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 6px 0 6px 10px;
  border-color: transparent transparent transparent #f0c040;
  margin-left: 2px;
}
/* Pause bars */
.pause-icon { display: flex; gap: 3px; }
.pause-icon span {
  display: block;
  width: 3px; height: 12px;
  background: #c8a04e;
  border-radius: 1px;
}

.timer-reset {
  background: linear-gradient(180deg, #2a1c08 0%, #1a1006 100%);
  font-size: 13px;
  color: #c8a04e;
}
.timer-reset:hover { border-color: #c8a04e; color: #f0c040; }

.scan-btn {
  background: linear-gradient(180deg, #2a1c08 0%, #1a1006 100%);
  font-size: 12px;
  color: #c8a04e;
}
.scan-btn:hover { border-color: #c8a04e; color: #f0c040; }
.scan-btn.scanning { background: linear-gradient(180deg, #7a5c18 0%, #4a3210 100%); border-color: #f0c040; }

/* ── Settings overlay ── */
#settings-panel {
  display: none;
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #1a1006 0%, #0d0a06 100%);
  flex-direction: column;
  padding: 12px;
  gap: 10px;
  z-index: 10;
  border: 1px solid #4a3210;
}
#settings-panel.open { display: flex; }
#settings-panel h2 { color: #f0c040; font-size: 13px; border-bottom: 1px solid #4a3210; padding-bottom: 6px; letter-spacing: 1px; text-shadow: 0 0 8px rgba(240,192,64,.4); }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
.setting-info { display: flex; flex-direction: column; gap: 2px; }
.setting-label { font-weight: 700; color: #c8a04e; font-size: 11px; }
.setting-desc { font-size: 10px; color: #6b4c1a; font-family: 'Segoe UI', sans-serif; }
.toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #1e1508; border: 1px solid #4a3210; border-radius: 20px; cursor: pointer; transition: background .2s; }
.slider::before { content: ""; position: absolute; width: 14px; height: 14px; left: 2px; top: 2px; background: #4a3210; border-radius: 50%; transition: transform .2s, background .2s; }
.toggle-switch input:checked + .slider { background: rgba(200,160,78,.15); border-color: #c8a04e; }
.toggle-switch input:checked + .slider::before { transform: translateX(16px); background: #f0c040; }
.trigger-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
.trigger-item { background: #0d0a06; border-left: 2px solid #c8a04e; padding: 3px 7px; font-size: 10px; color: #c8a04e; font-style: italic; font-family: 'Segoe UI', sans-serif; }
.close-btn { align-self: flex-start; background: linear-gradient(180deg, #2a1c08 0%, #1a1006 100%); border: 1px solid #4a3210; color: #c8a04e; padding: 4px 12px; border-radius: 2px; cursor: pointer; font-size: 11px; font-family: 'Cinzel', serif; }
.close-btn:hover { border-color: #c8a04e; color: #f0c040; }

/* ── Add screen ── */
#add-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 16px; padding: 24px; text-align: center;
  background: #2b2416;
}
#add-screen h2 { color: #f59e0b; font-size: 20px; }
#add-screen p { color: #9ca3af; font-size: 13px; line-height: 1.5; }
#add-btn {
  display: inline-block; margin-top: 8px;
  padding: 12px 28px; background: #f59e0b; color: #111827;
  font-size: 15px; font-weight: 700; border-radius: 8px;
  text-decoration: none; cursor: pointer;
}
#add-btn:hover { opacity: .85; }

/* ── Status ── */
.status-bar { font-size: 10px; color: #f59e0b; text-align: center; padding: 3px 0; }
</style>
</head>
<body>

<!-- Add screen -->
<div id="add-screen">
  <h2>Doghelper</h2>
  <p>Click below to add this plugin to your Alt1 Toolkit.</p>
  <a id="add-btn" href="#">Add to Alt1</a>
</div>

<!-- Main app -->
<div id="main-app" style="display:none; flex-direction:column; flex:1; min-height:0;">

  <div class="header">
    <h1>🐾 DogHelper</h1>
    <button class="settings-btn" id="settings-open-btn" title="Settings">⚙</button>
  </div>

  <div class="body">

    <div>
      <div class="icon-grid">
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lootbeam" title="Lootbeam alert">
            <img src="lootbeam.png" alt="">
          </button>
          <span class="btn-label">Lootbeam</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-scripture" title="Scripture of Elidinis">
            <img src="scripture.png" alt="">
          </button>
          <span class="btn-label">Scripture</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lobby" title="15-min lobby timer">
            <img src="lobby.png" alt="">
          </button>
          <span class="btn-label">Lobby</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-xp" title="XP Checker">
            <img src="xp.png" alt="">
          </button>
          <span class="btn-label">XP Check</span>
        </div>
      </div>
      <div id="last-alert" class="last-alert"></div>
    </div>

    <div style="display:flex;align-items:center;gap:5px;">
      <div class="timer-box" style="flex:1;">
        <div id="timer-display" class="timer-display">60:00</div>
        <button class="timer-reset" id="timer-reset" title="Reset">↺</button>
        <button class="timer-play" id="timer-play">
          <div class="play-icon" id="play-icon"></div>
        </button>
      </div>
      <button class="scan-btn" id="scan-btn" title="Force scan chatbox">👁</button>
    </div>
    <div id="status-bar" class="status-bar">Connecting...</div>

  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <button class="close-btn" id="settings-close-btn">← Back</button>
  <h2>Settings</h2>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Startup</div>
    <label class="setting-row" style="cursor:pointer">
      <div class="setting-info">
        <span class="setting-label">Auto-boot on chatbox detect</span>
        <span class="setting-desc">Start monitoring when a chatbox is found on screen</span>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="setting-autoboot">
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Lootbeam Phrases</div>
    <ul class="trigger-list" id="trigger-list"></ul>
  </div>
</div>

<script src="https://unpkg.com/alt1@0.1.2/dist/base/index.js"></script>
<script src="https://unpkg.com/alt1@0.1.2/dist/ocr/index.js"></script>
<script src="https://unpkg.com/alt1@0.1.2/dist/chatbox/index.js"></script>
<script src="https://unpkg.com/alt1@0.1.2/dist/xpcounter/index.js"></script>
<script>
// ── Config (from JSON) ────────────────────────────────────────────────────────
const LOOTBEAM_PHRASES = [
  "golden beam shines over","rainbow shines over","festive beam shines over",
  "sandcastle scene shines over","water spout sprays over","hearts twirl over",
  "flower blooms over","beam shines over","blooms over","twirl over","sprays over"
];
const LOOTBEAM_COLORS  = [[245,151,0]];

const SCRIPTURE_PHRASES = ["soul appears"];
const SCRIPTURE_COLORS  = [[255,255,255],[127,169,255],[30,251,0],[233,47,47]];

const LOBBY_DELAY    = 900;   // 15:00 background lobby alert
const TIMER_TOTAL    = 3600;  // 60:00 manual timer
const XP_IDLE_MS     = 3000;
const ALERT_COOLDOWN = 5000;
const COLOR_TOL      = 40;

// ── State ─────────────────────────────────────────────────────────────────────
let settings      = loadSettings();
// Manual 60-min timer
let timerSeconds  = TIMER_TOTAL;
let timerRunning  = false;
let timerInterval = null;
// Background lobby countdown
let lobbySeconds  = LOBBY_DELAY;
let lobbyRunning  = false;
let lobbyInterval = null;

let lastXpSeen   = Date.now();
let xpAlerted    = false;
let emptyReads   = 0;
const lastAlert  = { lootbeam:0, scripture:0, xp:0, lobby:0 };

// ── Settings ──────────────────────────────────────────────────────────────────
function loadSettings() {
  const def = { lootbeam:true, scripture:true, lobby:true, xp:true };
  try { return Object.assign(def, JSON.parse(localStorage.getItem("doghelper")||"{}")); }
  catch { return def; }
}
function saveSettings() { localStorage.setItem("doghelper", JSON.stringify(settings)); }

// ── Audio ─────────────────────────────────────────────────────────────────────
function playAlert(urgent) {
  try {
    const ctx = new AudioContext();
    const notes = urgent ? [880,1100,880] : [659,784,1047];
    notes.forEach((freq,i) => {
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=freq; osc.type="sine";
      const t=ctx.currentTime+i*0.15;
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.35,t+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      osc.start(t); osc.stop(t+0.4);
    });
  } catch(e) {}
}

// ── Lootbeam repeating sound ──────────────────────────────────────────────────
var alertSoundIntervals = { lootbeam: null, scripture: null };

function playWav() {
  try { new Audio("alert.wav").play(); } catch(e) {}
}

function startRepeatingSound(id) {
  stopRepeatingSound(id);
  playWav();
  alertSoundIntervals[id] = setInterval(playWav, 5000);
}

function stopRepeatingSound(id) {
  if (alertSoundIntervals[id]) { clearInterval(alertSoundIntervals[id]); alertSoundIntervals[id] = null; }
}

// ── Alert trigger ─────────────────────────────────────────────────────────────
function triggerAlert(id, urgent=false) {
  const now = Date.now();
  if (now - lastAlert[id] < ALERT_COOLDOWN) return;
  lastAlert[id] = now;

  if (id === "lootbeam" || id === "scripture") {
    startRepeatingSound(id);
  } else {
    playAlert(urgent);
  }

  const btn = document.getElementById("btn-"+id);
  if (btn) { btn.classList.add("alerting"); }
  document.getElementById("last-alert").textContent =
    "["+new Date().toLocaleTimeString()+"] "+id+" detected!";
}

// ── Color helpers ─────────────────────────────────────────────────────────────
function mixColor(r,g,b) { return r|(g<<8)|(b<<16); }
function colorDist(a,b) {
  return Math.sqrt(Math.pow(a[0]-b[0],2)+Math.pow(a[1]-b[1],2)+Math.pow(a[2]-b[2],2));
}
function fragMatchesColors(frag, colors, tol=COLOR_TOL) {
  return colors.some(c => colorDist(frag.color, c) <= tol);
}

// ── Chatbox reader ────────────────────────────────────────────────────────────
var chatReader = null;

function initChatReader() {
  if (typeof Chatbox === "undefined") { updateStatus("Chatbox lib missing"); return; }
  chatReader = new (Chatbox.ChatBoxReader || Chatbox.default)();
  chatReader.readargs = {
    colors: [
      mixColor(245,151,0),   // lootbeam
      mixColor(255,255,255), // white
      mixColor(127,169,255), // blue
      mixColor(30,251,0),    // green
      mixColor(233,47,47),   // red
    ],
    backwards: true
  };

  // Find chatbox, retry every 800ms until found
  var findTimer = setInterval(() => {
    try {
      chatReader.find();
      if (chatReader.pos && chatReader.pos.mainbox) {
        clearInterval(findTimer);
        updateStatus("Chatbox found — monitoring");
        setInterval(readChat, 250);
      }
    } catch(e) {}
  }, 800);

  // Re-detect if chatbox moves or is lost
  setInterval(() => {
    try {
      if (!chatReader.pos || !chatReader.pos.mainbox) chatReader.find();
    } catch(e) {}
  }, 2000);

}

// ── Chat read loop (250ms) ────────────────────────────────────────────────────
function readChat() {
  if (!chatReader) return;
  var lines;
  try { lines = chatReader.read(); } catch(e) { return; }

  if (!lines || !lines.length) {
    if (++emptyReads >= 10) { emptyReads=0; try { chatReader.pos=null; chatReader.find(); } catch(e){} }
    return;
  }
  emptyReads = 0;

  for (const line of lines) {
    if (!line.fragments || !line.fragments.length) continue;
    const text = line.fragments.map(f=>f.text||"").join("").toLowerCase();

    if (settings.lootbeam) {
      const hasPhrase = LOOTBEAM_PHRASES.some(p=>text.includes(p));
      if (hasPhrase) triggerAlert("lootbeam");
    }

    if (settings.scripture) {
      const hasCol   = line.fragments.some(f=>fragMatchesColors(f, SCRIPTURE_COLORS, 50));
      const hasPhrase = SCRIPTURE_PHRASES.some(p=>text.includes(p));
      if (hasCol && hasPhrase) triggerAlert("scripture");
    }
  }
}

// ── Force scan (scan-btn) ─────────────────────────────────────────────────────
function forceScan() {
  readChat();
  scanXp();
}

// ── XP counter reader ─────────────────────────────────────────────────────────
var xpReader = null;
var lastXpTotal = null;
var lastXpChange = Date.now();
const XP_REPEAT_MS = 3000;

function initXpReader() {
  const ReaderClass = (typeof Xpcounter !== "undefined") &&
    (Xpcounter.XpcounterReader || Xpcounter.default);
  if (!ReaderClass) { console.warn("Xpcounter library not available"); return; }

  xpReader = new ReaderClass();
  xpReader.findAsync();

  // Re-find if lost
  setInterval(() => { if (!xpReader.pos) xpReader.findAsync(); }, 2000);
  setInterval(checkXp, 250);
}

function checkXp() {
  if (!settings.xp || !xpReader || !xpReader.pos) return;
  try {
    xpReader.read();
    if (!xpReader.values || !xpReader.values.length) return;
    const total = xpReader.values.reduce((a, b) => a + b, 0);
    if (lastXpTotal === null || total !== lastXpTotal) {
      lastXpTotal = total;
      lastXpChange = Date.now();
      lastAlert["xp"] = 0; // reset so next idle triggers immediately
    } else if (Date.now() - lastXpChange > XP_IDLE_MS) {
      if (Date.now() - lastAlert["xp"] >= XP_REPEAT_MS) {
        triggerAlert("xp");
      }
    }
  } catch(e) {}
}

// ── Manual 60-min timer ───────────────────────────────────────────────────────
function fmt(s) { return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0"); }
function updateTimerDisplay() { document.getElementById("timer-display").textContent=fmt(timerSeconds); }
function setPlayIcon(on) {
  const icon=document.getElementById("play-icon"), btn=document.getElementById("timer-play");
  icon.outerHTML = on
    ? '<div class="pause-icon" id="play-icon"><span></span><span></span></div>'
    : '<div class="play-icon" id="play-icon"></div>';
  btn.classList.toggle("paused",on);
}
function startTimer() {
  if (timerRunning) return;
  timerRunning=true; setPlayIcon(true);
  document.getElementById("timer-display").classList.remove("done");
  timerInterval=setInterval(()=>{
    if (timerSeconds<=0) {
      clearInterval(timerInterval); timerRunning=false; setPlayIcon(false);
      document.getElementById("timer-display").classList.add("done");
      return;
    }
    timerSeconds--; updateTimerDisplay();
  },1000);
}
function pauseTimer() {
  timerRunning=false; clearInterval(timerInterval); timerInterval=null; setPlayIcon(false);
}
function resetTimer() {
  pauseTimer(); timerSeconds=TIMER_TOTAL; updateTimerDisplay();
  document.getElementById("timer-display").classList.remove("done");
}

// ── Background lobby countdown ────────────────────────────────────────────────
function startLobby() {
  if (lobbyRunning) return;
  lobbyRunning=true; lobbySeconds=LOBBY_DELAY;
  lobbyInterval=setInterval(()=>{
    if (lobbySeconds<=0) {
      triggerAlert("lobby", true);
      lobbySeconds=LOBBY_DELAY; // auto-reset and keep going
    }
    lobbySeconds--;
  },1000);
}
function stopLobby() {
  lobbyRunning=false; clearInterval(lobbyInterval); lobbyInterval=null;
}

function updateStatus(msg) { document.getElementById("status-bar").innerHTML=msg; }

// ── Toggle buttons ────────────────────────────────────────────────────────────
function toggleBtn(id) {
  const btn=document.getElementById("btn-"+id);
  // If lootbeam is alerting, clicking dismisses the sound without toggling
  if ((id==="lootbeam" || id==="scripture") && btn.classList.contains("alerting")) {
    stopRepeatingSound(id);
    btn.classList.remove("alerting");
    return;
  }
  settings[id]=!settings[id];
  btn.classList.toggle("on", settings[id]);
  btn.classList.toggle("off", !settings[id]);
  if (id==="lobby") { settings[id] ? startLobby() : stopLobby(); }
  if (id==="xp")    { lastXpSeen=Date.now(); xpAlerted=false; }
  saveSettings();
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  const cfgUrl = new URL("appconfig.json", window.location.href).href;
  document.getElementById("add-screen").style.display="none";
  document.getElementById("main-app").style.display="flex";

  if (typeof alt1 !== "undefined") {
    alt1.identifyAppUrl(cfgUrl);
    if (!alt1.permissionPixel) {
      updateStatus('\u26a0 Not added — <a href="alt1://addapp/'+cfgUrl+'" style="color:#f0c040">click here</a>');
    } else {
      updateStatus("Alt1 connected — finding chatbox...");
      initChatReader();
      initXpReader();
    }
  } else {
    updateStatus("Open in Alt1 to use");
  }

  ["lootbeam","scripture","lobby","xp"].forEach(id => {
    const btn=document.getElementById("btn-"+id);
    btn.classList.toggle("on", settings[id]);
    btn.classList.toggle("off", !settings[id]);
    btn.addEventListener("click", ()=>toggleBtn(id));
  });

  document.getElementById("timer-play").addEventListener("click", ()=>timerRunning?pauseTimer():startTimer());
  document.getElementById("timer-reset").addEventListener("click", resetTimer);

  document.getElementById("scan-btn").addEventListener("click", () => {
    const btn=document.getElementById("scan-btn");
    btn.classList.add("scanning");
    forceScan();
    setTimeout(()=>btn.classList.remove("scanning"), 800);
  });

  document.getElementById("settings-open-btn").addEventListener("click", ()=>
    document.getElementById("settings-panel").classList.add("open"));
  document.getElementById("settings-close-btn").addEventListener("click", ()=>
    document.getElementById("settings-panel").classList.remove("open"));

  updateTimerDisplay(); // show 60:00 on load
  if (settings.lobby) startLobby();
});
</script>
</body>
</html>
