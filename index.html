<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Doghelper</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: 'Segoe UI', Tahoma, sans-serif;
  background: #2b2416;
  color: #e5e7eb;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: #f5f0e8;
  color: #1a1a1a;
  padding: 6px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header h1 {
  font-size: clamp(14px, 4vw, 20px);
  font-weight: 700;
  color: #1a1a1a;
}
.settings-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 16px;
  color: #555;
  padding: 2px 6px;
  border-radius: 4px;
}
.settings-btn:hover { background: #e0dbd0; }

/* ── Main body ── */
.body {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 8px;
  min-height: 0;
  overflow: hidden;
  gap: 8px;
}

/* ── Icon grid ── */
.icon-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.btn-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.btn-label {
  font-size: 9px;
  font-weight: 600;
  color: #b0a898;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  width: 100%;
}

.icon-btn {
  width: 100%;
  aspect-ratio: 1;
  background: #f5f0e8;
  border: 3px solid #d4cfc6;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  transition: border-color .2s, box-shadow .2s;
  padding: 8px;
}
.icon-btn img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.icon-btn.off {
  opacity: 0.4;
  filter: grayscale(1);
}
.icon-btn.on {
  border-color: #f59e0b;
  box-shadow: 0 0 8px rgba(245,158,11,0.4);
}
.icon-btn.alerting {
  animation: glow .5s ease-in-out infinite alternate;
}
@keyframes glow {
  from { box-shadow: 0 0 4px rgba(245,158,11,.4); }
  to   { box-shadow: 0 0 18px rgba(245,158,11,1); }
}

/* Dot indicator */
.icon-btn::after {
  content: "";
  position: absolute;
  top: 4px; right: 4px;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  display: none;
}
.icon-btn.on::after { display: block; }
.icon-btn.off::after { display: block; background: #6b7280; }

/* ── Last alert ── */
.last-alert {
  font-size: 11px;
  color: #f59e0b;
  min-height: 14px;
  margin-top: 10px;
  text-align: center;
}

/* ── Timer box ── */
.timer-box {
  background: #f5f0e8;
  border-radius: 10px;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.timer-display {
  flex: 1;
  font-size: clamp(16px, 6vw, 28px);
  font-weight: 700;
  color: #1a1a1a;
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  text-align: center;
  background: #fff;
  border: 2px solid #ccc;
  border-radius: 6px;
  padding: 6px 10px;
  transition: color .3s;
}
.timer-display.done { color: #ef4444; }

.timer-play {
  width: 52px;
  height: 52px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.timer-play:hover { background: #16a34a; }
.timer-play.paused { background: #f59e0b; }
.timer-play.paused:hover { background: #d97706; }

/* Play triangle */
.play-icon {
  width: 0; height: 0;
  border-style: solid;
  border-width: 10px 0 10px 18px;
  border-color: transparent transparent transparent #fff;
  margin-left: 3px;
}
/* Pause bars */
.pause-icon {
  display: flex; gap: 5px;
}
.pause-icon span {
  display: block;
  width: 5px; height: 20px;
  background: #fff;
  border-radius: 2px;
}

.timer-reset {
  width: 36px; height: 36px;
  background: #d4cfc6;
  border: none; border-radius: 6px;
  cursor: pointer; font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: background .15s;
}
.timer-reset:hover { background: #bbb6ac; }

/* ── Settings overlay ── */
#settings-panel {
  display: none;
  position: fixed; inset: 0;
  background: #1a1612;
  flex-direction: column;
  padding: 14px;
  gap: 12px;
  z-index: 10;
}
#settings-panel.open { display: flex; }
#settings-panel h2 { color: #f59e0b; font-size: 15px; border-bottom: 1px solid #333; padding-bottom: 6px; }
.setting-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 4px 0; }
.setting-info { display: flex; flex-direction: column; gap: 2px; }
.setting-label { font-weight: 600; color: #e5e7eb; }
.setting-desc { font-size: 11px; color: #6b7280; }
.toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; background: #374151; border-radius: 22px; cursor: pointer; transition: background .2s; }
.slider::before { content: ""; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #9ca3af; border-radius: 50%; transition: transform .2s, background .2s; }
.toggle-switch input:checked + .slider { background: rgba(245,158,11,.3); }
.toggle-switch input:checked + .slider::before { transform: translateX(18px); background: #f59e0b; }
.trigger-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
.trigger-item { background: #2b2416; border-left: 3px solid #f59e0b; padding: 4px 8px; border-radius: 0 4px 4px 0; font-size: 11px; color: #d1d5db; font-style: italic; }
.close-btn { align-self: flex-start; background: #374151; border: none; color: #e5e7eb; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; }

/* ── Add screen ── */
#add-screen {
  display: none;
  flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; gap: 16px; padding: 24px; text-align: center;
  background: #2b2416;
}
#add-screen h2 { color: #f59e0b; font-size: 20px; }
#add-screen p { color: #9ca3af; font-size: 13px; line-height: 1.5; }
#add-btn {
  display: inline-block; margin-top: 8px;
  padding: 12px 28px; background: #f59e0b; color: #111827;
  font-size: 15px; font-weight: 700; border-radius: 8px;
  text-decoration: none; cursor: pointer;
}
#add-btn:hover { opacity: .85; }

/* ── Status ── */
.status-bar { font-size: 10px; color: #4b5563; text-align: center; padding: 3px 0; }
</style>
</head>
<body>

<!-- Add screen -->
<div id="add-screen">
  <h2>Doghelper</h2>
  <p>Click below to add this plugin to your Alt1 Toolkit.</p>
  <a id="add-btn" href="#">Add to Alt1</a>
</div>

<!-- Main app -->
<div id="main-app" style="display:none; flex-direction:column; flex:1; min-height:0;">

  <div class="header">
    <h1>Doghelper</h1>
    <button class="settings-btn" id="settings-open-btn" title="Settings">⚙</button>
  </div>

  <div class="body">

    <div>
      <div class="icon-grid">
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lootbeam" title="Lootbeam alert">
            <img src="lootbeam.png" alt="">
          </button>
          <span class="btn-label">Lootbeam</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-scripture" title="Scripture of Elidinis">
            <img src="scripture.png" alt="">
          </button>
          <span class="btn-label">Scripture</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-lobby" title="15-min lobby timer">
            <img src="lobby.png" alt="">
          </button>
          <span class="btn-label">Lobby</span>
        </div>
        <div class="btn-wrap">
          <button class="icon-btn on" id="btn-xp" title="XP Checker">
            <img src="xp.png" alt="">
          </button>
          <span class="btn-label">XP Check</span>
        </div>
      </div>
      <div id="last-alert" class="last-alert"></div>
    </div>

    <div>
      <div class="timer-box">
        <div id="timer-display" class="timer-display">60:00</div>
        <button class="timer-reset" id="timer-reset" title="Reset">↺</button>
        <button class="timer-play" id="timer-play">
          <div class="play-icon" id="play-icon"></div>
        </button>
      </div>
      <div id="status-bar" class="status-bar">Connecting...</div>
    </div>

  </div>
</div>

<!-- Settings panel -->
<div id="settings-panel">
  <button class="close-btn" id="settings-close-btn">← Back</button>
  <h2>Settings</h2>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Startup</div>
    <label class="setting-row" style="cursor:pointer">
      <div class="setting-info">
        <span class="setting-label">Auto-boot on chatbox detect</span>
        <span class="setting-desc">Start monitoring when a chatbox is found on screen</span>
      </div>
      <div class="toggle-switch">
        <input type="checkbox" id="setting-autoboot">
        <span class="slider"></span>
      </div>
    </label>
  </div>

  <div style="background:#2b2416;border-radius:8px;padding:10px 12px">
    <div style="font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Lootbeam Phrases</div>
    <ul class="trigger-list" id="trigger-list"></ul>
  </div>
</div>

<script>
const LOOTBEAM_PHRASES = [
  "golden beam shines over",
  "rainbow shines over",
  "festive beam shines over",
  "sandcastle scene shines over",
  "water spout sprays over",
  "hearts twirl over",
];
const LOOTBEAM_COLOR = [245, 151, 0];
const COLOR_TOLERANCE = 35;
const MIN_COLOR_PIXELS = 40;
const SCAN_MS = 600;
const TIMER_TOTAL = 60 * 60;

let settings = loadSettings();
let timerSeconds = TIMER_TOTAL;
let timerRunning = false;
let timerInterval = null;
let lastAlertTime = 0;

function loadSettings() {
  try { return Object.assign({ lootbeamEnabled: true, autoBoot: false }, JSON.parse(localStorage.getItem("doghelper") || "{}")); }
  catch { return { lootbeamEnabled: true, autoBoot: false }; }
}
function saveSettings() { localStorage.setItem("doghelper", JSON.stringify(settings)); }

function playAlert(urgent) {
  try {
    const ctx = new AudioContext();
    const notes = urgent ? [880, 1100, 880] : [659, 784, 1047];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = "sine";
      const t = ctx.currentTime + i * 0.15;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.35, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

function colorMatches(r, g, b) {
  return Math.abs(r-LOOTBEAM_COLOR[0]) < COLOR_TOLERANCE &&
         Math.abs(g-LOOTBEAM_COLOR[1]) < COLOR_TOLERANCE &&
         Math.abs(b-LOOTBEAM_COLOR[2]) < COLOR_TOLERANCE;
}

function scanChatbox() {
  if (typeof alt1 === "undefined" || !alt1.permissionPixel) return;
  try {
    const rsW = alt1.rsWidth, rsH = alt1.rsHeight, rsX = alt1.rsX, rsY = alt1.rsY;
    if (!rsW || !rsH) return;
    const cx = rsX, cy = rsY + Math.floor(rsH * 0.78);
    const cw = Math.floor(rsW * 0.62), ch = Math.floor(rsH * 0.22);
    const pixels = alt1.capture(cx, cy, cw, ch);
    if (!pixels) return;
    updateStatus("Alt1 connected — chatbox found");
    if (!settings.lootbeamEnabled || Date.now() - lastAlertTime < 3000) return;
    let count = 0;
    for (let i = 0; i < pixels.length; i += 4)
      if (colorMatches(pixels[i], pixels[i+1], pixels[i+2])) count++;
    if (count >= MIN_COLOR_PIXELS) { lastAlertTime = Date.now(); triggerLootbeamAlert(); }
  } catch(e) { console.error(e); }
}

function triggerLootbeamAlert() {
  playAlert(false);
  const btn = document.getElementById("btn-lootbeam");
  btn.classList.add("alerting");
  setTimeout(() => btn.classList.remove("alerting"), 3000);
  document.getElementById("last-alert").textContent =
    "[" + new Date().toLocaleTimeString() + "] Lootbeam detected!";
}

// Timer
function fmt(s) {
  return String(Math.floor(s/60)).padStart(2,"0") + ":" + String(s%60).padStart(2,"0");
}
function updateTimerDisplay() { document.getElementById("timer-display").textContent = fmt(timerSeconds); }
function setPlayIcon(running) {
  const icon = document.getElementById("play-icon");
  const btn  = document.getElementById("timer-play");
  if (running) {
    icon.outerHTML = '<div class="pause-icon" id="play-icon"><span></span><span></span></div>';
    btn.classList.add("paused");
  } else {
    icon.outerHTML = '<div class="play-icon" id="play-icon"></div>';
    btn.classList.remove("paused");
  }
}
function startTimer() {
  if (timerRunning) return;
  timerRunning = true;
  setPlayIcon(true);
  document.getElementById("timer-display").classList.remove("done");
  timerInterval = setInterval(() => {
    if (timerSeconds <= 0) {
      clearInterval(timerInterval); timerRunning = false; setPlayIcon(false);
      document.getElementById("timer-display").classList.add("done");
      playAlert(true); return;
    }
    timerSeconds--; updateTimerDisplay();
  }, 1000);
}
function pauseTimer() {
  timerRunning = false; clearInterval(timerInterval); timerInterval = null; setPlayIcon(false);
}
function resetTimer() {
  pauseTimer(); timerSeconds = TIMER_TOTAL; updateTimerDisplay();
  document.getElementById("timer-display").classList.remove("done");
}

function updateStatus(msg) { document.getElementById("status-bar").textContent = msg; }

document.addEventListener("DOMContentLoaded", () => {
  const cfgUrl = new URL("appconfig.json", window.location.href).href;

  // Always show the main app
  document.getElementById("add-screen").style.display = "none";
  document.getElementById("main-app").style.display = "flex";

  if (typeof alt1 !== "undefined") {
    alt1.identifyAppUrl(cfgUrl);
    updateStatus("Alt1 connected — scanning...");
    setInterval(scanChatbox, SCAN_MS);
  } else {
    updateStatus("Open in Alt1 — alt1://addapp/" + cfgUrl);
  }

  // Lootbeam toggle
  const lbBtn = document.getElementById("btn-lootbeam");
  lbBtn.classList.toggle("on", settings.lootbeamEnabled);
  lbBtn.classList.toggle("off", !settings.lootbeamEnabled);
  lbBtn.addEventListener("click", () => {
    settings.lootbeamEnabled = !settings.lootbeamEnabled;
    lbBtn.classList.toggle("on", settings.lootbeamEnabled);
    lbBtn.classList.toggle("off", !settings.lootbeamEnabled);
    saveSettings();
  });

  // Timer
  updateTimerDisplay();
  document.getElementById("timer-play").addEventListener("click", () => timerRunning ? pauseTimer() : startTimer());
  document.getElementById("timer-reset").addEventListener("click", resetTimer);

  // Settings
  document.getElementById("settings-open-btn").addEventListener("click", () =>
    document.getElementById("settings-panel").classList.add("open"));
  document.getElementById("settings-close-btn").addEventListener("click", () =>
    document.getElementById("settings-panel").classList.remove("open"));

  const abEl = document.getElementById("setting-autoboot");
  abEl.checked = settings.autoBoot;
  abEl.addEventListener("change", () => { settings.autoBoot = abEl.checked; saveSettings(); });

  const list = document.getElementById("trigger-list");
  LOOTBEAM_PHRASES.forEach(p => {
    const li = document.createElement("li");
    li.className = "trigger-item";
    li.textContent = '"' + p + '"';
    list.appendChild(li);
  });
});
</script>
</body>
</html>
